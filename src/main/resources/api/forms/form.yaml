get:
  summary: Henter et skjema
  operationId: getForm
  description: Henter siste revisjon av skjemaet når `revision` utelates. Hvis `revision` er oppgitt returneres den angitte revisjonen.
  security: []
  parameters:
    - name: formPath
      in: path
      description: Skjemaets path
      required: true
      schema:
        $ref: "./components.yaml#/components/schemas/FormPath"
    - name: select
      description: Kommaseparert liste med hvilke egenskaper som skal inkluderes. Id blir alltid inkludert.
      example: path,title,introPage
      in: query
      required: false
      schema:
        type: string
    - name: includeDeleted
      in: query
      description: Returner skjema også dersom det er slettet. Standardverdi er false.
      required: false
      schema:
        type: boolean
        default: false
    - name: revision
      in: query
      description: Henter en spesifikk revisjon av skjemaet. Når den utelates returneres siste revisjon.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
  responses:
    200:
      description: Returnerer skjemadefinisjonen
      content:
        application/json:
          schema:
            $ref: "./components.yaml#/components/schemas/FormDto"
    404:
      description: Finner ikke skjema med gitt id
      content:
        application/json:
          schema:
            $ref: "../common/components.yaml#/components/schemas/ErrorResponseDto"
  tags:
    - edit-forms

put:
  summary: Oppdaterer skjema
  operationId: updateForm
  security:
  - bearerAuth: []
  parameters:
    - name: formPath
      in: path
      description: Skjemaets path
      required: true
      schema:
        $ref: "./components.yaml#/components/schemas/FormPath"
    - name: Formsapi-Entity-Revision
      in: header
      description: Hvilken revisjon som skal endres
      required: true
      schema:
        $ref: "./components.yaml#/components/schemas/FormRevision"
  requestBody:
   content:
     application/json:
       schema:
         $ref: "./components.yaml#/components/schemas/UpdateFormRequest"
   required: true
  responses:
    200:
      description: Returnerer skjemadefinisjonen
      content:
        application/json:
          schema:
            $ref: "./components.yaml#/components/schemas/FormDto"
    404:
      description: Finner ikke skjema med gitt id
      content:
        application/json:
          schema:
            $ref: "../common/components.yaml#/components/schemas/ErrorResponseDto"
    409:
      description: Feiler dersom skjemaet er låst, eller hvis man oppgir en revisjon som ikke er den nyeste
      content:
        application/json:
          schema:
            $ref: "../common/components.yaml#/components/schemas/ErrorResponseDto"
  tags:
    - edit-forms

delete:
  summary: Slettemerker skjema
  operationId: deleteForm
  security:
    - bearerAuth: []
  parameters:
    - name: formPath
      in: path
      description: Skjemaets path
      required: true
      schema:
        $ref: "./components.yaml#/components/schemas/FormPath"
    - name: Formsapi-Entity-Revision
      in: header
      description: Gjeldende revisjon. Hvis det finnes nyere revisjoner, vil slettingen feile.
      required: true
      schema:
        $ref: "./components.yaml#/components/schemas/FormRevision"
  responses:
      204:
        description: Skjemaet er slettet
      404:
        description: Finner ikke skjema med gitt id
        content:
          application/json:
            schema:
              $ref: "../common/components.yaml#/components/schemas/ErrorResponseDto"
      409:
        description: Feiler dersom skjemaet er låst, eller hvis man oppgir en revisjon som ikke er den nyeste
        content:
          application/json:
            schema:
              $ref: "../common/components.yaml#/components/schemas/ErrorResponseDto"
  tags:
    - edit-forms
